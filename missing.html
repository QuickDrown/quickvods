<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VODs faltantes</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body{
    background-color:#08121f;
    background-image:
        linear-gradient(rgba(6, 12, 20, 0.82), rgba(6, 12, 20, 0.88)),
        url("Billie-Eilish-1920x1280.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
    padding:24px;
    }

    .container{
      max-width:1500px;
      margin:0 auto;
    }

    h1{
      text-align:center;
      margin:0 0 8px;
      font-size:34px;
    }

    .subtitle{
      text-align:center;
      color:#bdbdbd;
      max-width:850px;
      margin:0 auto 18px;
      line-height:1.5;
    }

    .summary-box{
      max-width:700px;
      margin:0 auto 20px;
      background:#171717;
      border:1px solid #2a2a2a;
      border-radius:14px;
      padding:16px;
    }

    .summary-stats{
      text-align:center;
      color:#d6d6d6;
      font-size:14px;
      margin-bottom:12px;
    }

    .progress-bar{
      width:100%;
      height:12px;
      background:#1f1f1f;
      border:1px solid #2d2d2d;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#ef4444,#f59e0b);
      border-radius:999px;
      transition:width 0.9s ease;
    }

    .top-actions{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      margin:18px 0 26px;
    }

    .top-actions a{
      color:#9fd0ff;
      text-decoration:none;
      background:#1b1b1b;
      border:1px solid #2c2c2c;
      border-radius:10px;
      padding:10px 14px;
    }

    .top-actions a:hover{
      background:#242424;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
      gap:18px;
    }

    .card{
      background:#1c1c1c;
      border-radius:14px;
      overflow:hidden;
      transition:transform 0.15s ease, box-shadow 0.15s ease;
      border:1px solid rgba(255,90,90,0.12);
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 8px 24px rgba(0,0,0,0.45);
    }

    .card-main{
      padding:10px;
      cursor:pointer;
    }

    .thumb-wrap{
      position:relative;
      margin-bottom:8px;
    }

    .thumb-wrap > img{
      width:100%;
      border-radius:10px;
      object-fit:cover;
      aspect-ratio:16/9;
      display:block;
      filter:saturate(0.88);
    }

    .vod-status-badge{
      position:absolute;
      top:8px;
      right:8px;
      min-width:28px;
      height:28px;
      padding:0 8px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      background:rgba(0,0,0,0.78);
      backdrop-filter:blur(4px);
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
      z-index:2;
      border:1px solid rgba(255,90,90,0.45);
    }

    .fecha{
      font-weight:bold;
      font-size:14px;
      color:#6ec1ff;
    }

    .hora{
      color:#aaa;
      font-size:13px;
      margin-bottom:4px;
    }

    .titulo{
      font-size:15px;
      line-height:1.35;
      min-height:40px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .mini-meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:10px;
    }

    .pill{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .pill.streamer{
      background:#24303d;
      color:#9fd0ff;
    }

    .pill.missing{
      background:#351b1b;
      color:#ffb1b1;
    }

    .pill.searching{
      background:#3a3015;
      color:#ffd77d;
    }

    .pill.trade{
      background:#1d2e44;
      color:#9fc7ff;
    }

    .contact-note{
      margin-top:10px;
      color:#cfcfcf;
      font-size:13px;
      line-height:1.45;
    }

    .empty{
      text-align:center;
      color:#bdbdbd;
      margin-top:40px;
      font-size:16px;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.82);
      z-index:999;
      padding:30px;
      box-sizing:border-box;
      overflow:auto;
    }

    .modal.open{
      display:block;
    }

    .modal-content{
      max-width:1180px;
      margin:0 auto;
      background:#181818;
      border-radius:16px;
      padding:20px;
      position:relative;
    }

    .close-btn{
      position:absolute;
      top:12px;
      right:16px;
      background:none;
      border:none;
      color:white;
      font-size:28px;
      cursor:pointer;
    }

    .modal-title{
      font-size:24px;
      margin-bottom:8px;
      padding-right:40px;
    }

    .modal-info{
      color:#bdbdbd;
      margin-bottom:16px;
    }

    .modal-main{
      width:100%;
      max-height:560px;
      object-fit:contain;
      border-radius:12px;
      background:#101010;
      margin-bottom:18px;
    }

    .vod-status-panel{
      margin-bottom:16px;
      padding:10px 12px;
      border-radius:10px;
      background:#1b1b1b;
      border:1px solid rgba(255,90,90,0.3);
    }

    .vod-status-line{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:600;
    }

    .vod-status-help{
      margin-top:8px;
      font-size:14px;
      color:#bdbdbd;
      line-height:1.4;
    }

    .vod-status-actions{
      margin-top:10px;
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .vod-copy-btn{
      background:#2a2a2a;
      color:white;
      border:1px solid #3a3a3a;
      border-radius:8px;
      padding:6px 10px;
      font-size:13px;
      cursor:pointer;
      width:fit-content;
      display:inline-flex;
      align-items:center;
      gap:6px;
      transition:all 0.2s ease;
    }

    .vod-copy-btn:hover{
      background:#353535;
    }

    .vod-copy-btn.copied{
      background:#1f6f43;
      border-color:#1f6f43;
      color:#d4ffe6;
    }

    .vod-contact-text{
      font-size:14px;
      color:#bdbdbd;
    }

    .vod-discord{
      color:#9fd0ff;
      font-weight:600;
    }

    .vod-stats{
    text-align:center;
    margin-bottom:10px;
    color:#d6d6d6;
    font-size:14px;
    }

    .progress-wrap{
    max-width:600px;
    margin:0 auto;
    }

    .progress-bar{
    width:100%;
    height:12px;
    background:#1f1f1f;
    border:1px solid #2d2d2d;
    border-radius:999px;
    overflow:hidden;
    }

    .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#3b82f6,#22c55e);
    border-radius:999px;
    transition:width 0.9s ease;
    }

    .progress-text{
    text-align:center;
    margin-top:8px;
    color:#bdbdbd;
    font-size:13px;
    }

    .card{
  position:relative;
}

.card-event{
  border:2px solid #b46cff;
  background:
    radial-gradient(
      circle at bottom,
      rgba(180,108,255,0.18),
      rgba(180,108,255,0.05) 40%,
      transparent 70%
    ),
    #1c1c1c;

  box-shadow:
    0 0 10px rgba(180,108,255,0.6),
    0 0 25px rgba(180,108,255,0.4),
    0 0 50px rgba(180,108,255,0.2);

  animation:eventGlowPurple 3s ease-in-out infinite;
}

@keyframes eventGlowPurple{
  0%,100%{
    box-shadow:
      0 0 10px rgba(180,108,255,0.45),
      0 0 22px rgba(180,108,255,0.25);
  }

  50%{
    box-shadow:
      0 0 18px rgba(180,108,255,0.9),
      0 0 40px rgba(180,108,255,0.45),
      0 0 70px rgba(180,108,255,0.25);
  }
}

.card-event-badge{
  position:absolute;
  top:0;
  left:0;

  width:22px;
  height:22px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:#b46cff;
  color:white;

  font-size:12px;
  font-weight:bold;

  border-radius:8px 0 8px 0;

  z-index:5;
  box-shadow:0 0 6px rgba(180,108,255,0.7);
}

.modal-content{
  border:1px solid transparent;
}

.modal-content.modal-event{
  border:2px solid #b46cff !important;
  background:
    radial-gradient(
      circle at top,
      rgba(180,108,255,0.18),
      rgba(180,108,255,0.06) 35%,
      rgba(24,24,24,1) 78%
    ),
    #181818 !important;

  box-shadow:
    0 0 18px rgba(180,108,255,0.42),
    0 0 42px rgba(180,108,255,0.20) !important;
}

.modal-content.modal-event .vod-status-panel{
  border-color:rgba(180,108,255,0.28);
}

.modal-content.modal-event .modal-title{
  color:#ead8ff;
}























  </style>
</head>
<body>
  <div class="container">
    <h1>VODs faltantes</h1>
    <p class="subtitle">
      Esta sección muestra los VODs que faltan o que sigo buscando. Si tienes alguno,
      puedes ayudar a completar el archivo y escribirme directamente con la información del stream.
    </p>

    <div class="summary-box">
    <div id="vodStats" class="vod-stats"></div>

    <div class="progress-wrap">
        <div class="progress-bar">
        <div id="vodProgressFill" class="progress-fill"></div>
        </div>
        <div id="vodProgressText" class="progress-text"></div>
    </div>
    </div>

    <div class="top-actions">
      <a href="index.html">← Volver al catálogo</a>
      <a href="intercambio.html">Contacto / Intercambio</a>
    </div>

    <div id="missingGrid" class="grid"></div>
    <div id="missingEmpty" class="empty" style="display:none;">No hay VODs faltantes ahora mismo.</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="close-btn" id="closeModal">&times;</button>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-info" id="modalInfo"></div>
      <div id="modalStatus"></div>
      <img class="modal-main" id="modalMainImage" src="" alt="">
    </div>
  </div>

  <script>
    const streamsUrl = "streams_public.json";
    const DISCORD_CONTACT = "Quick_Drown";
    let streams = [];

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function getStatusInfo(stream) {
      switch (stream.status) {
        case "available":
          return { icon: "✅", label: "Disponible", className: "status-available" };
        case "missing":
          return { icon: "❌", label: "Missing", className: "status-missing" };
        case "searching":
          return { icon: "🔍", label: "Buscando", className: "status-searching" };
        case "trade":
          return { icon: "🤝", label: "Intercambio", className: "status-trade" };
        default:
          return { icon: "", label: "", className: "" };
      }
    }

    function buildMissingVodMessage(stream) {
      return `Hola, creo que tengo este VOD:

        Título: ${stream.title}
        Streamer: ${stream.streamer}
        Fecha: ${stream.day}-${stream.month}-${stream.year}
        Horario: ${stream.startTime} → ${stream.endTime}
        Duración: ${stream.durationText}
        Referencia: ${stream.slug}`;
            }

    async function copyMissingVodMessage(stream, button) {
      const message = buildMissingVodMessage(stream);

      try {
        await navigator.clipboard.writeText(message);

        const originalText = button.innerHTML;
        button.classList.add("copied");
        button.innerHTML = "✔ Copiado";

        setTimeout(() => {
          button.classList.remove("copied");
          button.innerHTML = originalText;
        }, 2000);

      } catch (err) {
        console.error("No se pudo copiar");
      }
    }

    function getStatusBlock(stream) {
      const status = getStatusInfo(stream);

      if (!status.icon) return "";

      let extraText = "";

      if (stream.status === "missing" || stream.status === "searching" || stream.status === "trade") {
        extraText = `
          <div class="vod-status-help">
            ¿Tienes este VOD? Puedes ayudar a completar el archivo.
          </div>
          <div class="vod-status-actions">
            <button class="vod-copy-btn" data-copy-missing="${escapeHtml(stream.streamKey)}">📋 Copiar mensaje</button>
            <div class="vod-contact-text">Discord: <span class="vod-discord">${DISCORD_CONTACT}</span></div>
          </div>
        `;
      }

      return `
        <div class="vod-status-panel ${status.className}">
          <div class="vod-status-line">
            <span>${status.icon}</span>
            <span>${status.label}</span>
          </div>
          ${extraText}
        </div>
      `;
    }

    function updateMissingStats() {
      const summary = document.getElementById("missingSummary");
      const progressFill = document.getElementById("missingProgressFill");

      const archived = streams.filter(s => s.status === "available").length;
      const missing = streams.filter(s => s.status === "missing").length;
      const searching = streams.filter(s => s.status === "searching").length;
      const wanted = missing + searching;
      const total = streams.length;
      const percentMissing = total > 0 ? Math.round((wanted / total) * 100) : 0;

      summary.innerHTML = `VODs faltantes o buscados: <b>${wanted}</b> · Total archivado: <b>${total}</b>`;

      requestAnimationFrame(() => {
        progressFill.style.width = `${percentMissing}%`;
      });
    }

    function openModal(stream) {
      const modal = document.getElementById("modal");
      const modalContent = document.querySelector(".modal-content");
      const modalTitle = document.getElementById("modalTitle");
      const modalInfo = document.getElementById("modalInfo");
      const modalMainImage = document.getElementById("modalMainImage");
      const modalStatus = document.getElementById("modalStatus");

      
      modalContent.classList.remove("modal-event");

      if (stream.event === "special") {
        modalContent.classList.add("modal-event");
      }


      modalTitle.textContent = stream.title;
      modalInfo.innerHTML = `
        <span>${escapeHtml(stream.streamer)}</span>
        · ${stream.day}-${stream.month}-${stream.year}
        · ${stream.startTime} → ${stream.endTime}
        · ${stream.durationText}
      `;
      modalMainImage.src = stream.image;
      modalMainImage.alt = stream.title;
      modalStatus.innerHTML = getStatusBlock(stream);

      const copyBtn = modalStatus.querySelector("[data-copy-missing]");
      if (copyBtn) {
        copyBtn.onclick = () => copyMissingVodMessage(stream, copyBtn);
      }

      modal.classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("open");
      document.querySelector(".modal-content").classList.remove("modal-event");
    }

    function renderMissingVodPage() {
      const grid = document.getElementById("missingGrid");
      const empty = document.getElementById("missingEmpty");

      const missing = streams
        .filter(s => s.status === "missing" || s.status === "searching")
        .sort((a,b)=> b.date.localeCompare(a.date));

      grid.innerHTML = "";

      if (missing.length === 0) {
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";

      missing.forEach(s => {
        const status = getStatusInfo(s);

        const card = document.createElement("div");
        card.className = "card";

        if (s.event === "special") {
          card.classList.add("card-event");
        }

        const eventBadge = s.event === "special"
          ? `<div class="card-event-badge">⭐</div>`
          : "";

        card.innerHTML = `
          <div class="card-main">
            <div class="thumb-wrap">
              ${eventBadge}
              <img src="${s.image}" alt="${escapeHtml(s.title)}">
              <div class="vod-status-badge ${status.className}" title="${status.label}">${status.icon}</div>
            </div>
            <div class="fecha">${s.day}-${s.month}-${s.year}</div>
            <div class="hora">${s.startTime} → ${s.endTime} · ${s.durationText}</div>
            <div class="titulo">${escapeHtml(s.title)}</div>
            <div class="mini-meta">
              <span class="pill streamer">${escapeHtml(s.streamer)}</span>
              ${
                s.status === "missing"
                  ? `<span class="pill missing">❌ Missing</span>`
                  : s.status === "searching"
                    ? `<span class="pill searching">🔍 Buscando</span>`
                    : `<span class="pill trade">🤝 Intercambio</span>`
              }
            </div>
            <div class="contact-note">
              Si tienes este VOD, puedes abrirlo y copiar el mensaje para contactarme más rápido.
            </div>
          </div>
        `;

        card.onclick = () => openModal(s);
        grid.appendChild(card);
      });
    }

    document.getElementById("closeModal").onclick = closeModal;

    window.onclick = function (event) {
      const modal = document.getElementById("modal");
      if (event.target === modal) {
        closeModal();
      }
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeModal();
      }
    });

    fetch(streamsUrl)
    .then(response => response.json())
    .then(data => {
        streams = data;

        updateArchiveProgress();

        renderMissingVodPage();
    });

    function updateArchiveProgress(){

    const stats = document.getElementById("vodStats");
    const fill = document.getElementById("vodProgressFill");
    const text = document.getElementById("vodProgressText");

    if(!stats || !fill || !text) return;

    const archived = streams.filter(s => s.status === "available").length;
    const missing = streams.filter(s => s.status === "missing").length;
    const searching = streams.filter(s => s.status === "searching").length;

    const total = streams.length;

    const percent = total > 0
        ? Math.round((archived / total) * 100)
        : 0;

    stats.innerHTML =
        `Archivo completado: <b>${archived}</b> / <b>${total}</b> (${percent}%)`;

    text.innerHTML =
        `VODs faltantes: <b>${missing}</b>` +
        (searching > 0 ? ` · Buscando: <b>${searching}</b>` : "");

    requestAnimationFrame(()=>{
        fill.style.width = percent + "%";
    });

    }

















  </script>
</body>
</html>
